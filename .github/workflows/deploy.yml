# .github/workflows/deploy.yml

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write  # necesario para OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OIDC — GitHub obtiene token temporal de AWS, no hay secrets guardados
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/x100-ecommerce-github-actions-role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan

      # Apply solo en push a main, no en PRs
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: terraform
        run: terraform apply -auto-approve

      # Actualiza el código de cada Lambda si el hash cambió
      - name: Deploy Lambda presigned_url
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          zip -j lambda/presigned_url/handler.zip lambda/presigned_url/handler.py
          aws lambda update-function-code \
            --function-name x100-ecommerce-presigned-url \
            --zip-file fileb://lambda/presigned_url/handler.zip

      - name: Deploy Lambda image_processor
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          zip -j lambda/image_processor/handler.zip lambda/image_processor/handler.py
          aws lambda update-function-code \
            --function-name x100-ecommerce-image-processor \
            --zip-file fileb://lambda/image_processor/handler.zip
